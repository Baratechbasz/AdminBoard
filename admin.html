<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Board</title>
</head>
<body>
    <nav>   
        <button id="settings">Settings</button>
        <button id="manage">Manage</button>
        <span id="adminName">Admin name</span>
    </nav>
    <table id="table">
    <thead> 
        <tr>  
            <th>Nazwa</th>
            <th>pkt. pozytywne</th>
            <th>pkt. negatywne</th>
            <th>pkt. specjalne</th>
        </tr>
    </thead>
    <tbody id="tableBody">  
    </tbody>
</table>
<ul id="commit">    
    
</ul>

<div id="settingsModal" class="modal">
    <div class="modal-content">
            <span class="close" id="closeSettings">&times;</span>
        <h2>Settings</h2>
            <input type="checkbox" id="darklightmode">Light/Dark mode<br>
        <hr>
    <div class="change-password">
        <h3>Zmiana hasła</h3>
            <input type="password" id="oldPassword" placeholder="Stare hasło">
            <input type="password" id="newPassword" placeholder="Nowe hasło">
            <span id="passwordError" style="color: red;"></span>
    <button id="changePasswordBtn">Zapisz</button>
        </div>
    <button id="logoutBtn">Wyloguj</button>
    <br>
        </div>
</div>

<div id="manageModal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeManage">&times;</span>
        <h2>Manage Users</h2>
        <input type="text" id="userId" placeholder="User ID">
        <input type="number" id="points" placeholder="Points">
        <select id="pointsType">
            <option value="POSITIVE">Positive</option>
            <option value="NEGATIVE">Negative</option>
            <option value="SPECIAL">Special</option>
        </select>
        <input type="text" id="reason" placeholder="Reason">
        <button id="addPointsBtn">Add Points</button>
    </div>
    </div>
<script src="admin.js"></script>
</body>
</html>
