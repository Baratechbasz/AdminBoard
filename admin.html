    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Admin Board</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pliant:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <nav>
        <img src="logo.png" alt="Logo" id="logo">
        <p id="lamasTeam">Lama's Team</p>
        <div id="navRight">
            <button id="manage"><i class="fa-solid fa-triangle-exclamation" style="color: red;"></i></button>
            <button id="Rules">Regulamin</button>
            <button id="settings"><i class="fa-solid fa-gear"></i></button>
            <span id="adminName">Nazwa admina</span>
        </div>
    </nav>
        <div id="mainContent">
        <table id="table">
    <thead> 
        <tr>  
            <th>Nazwa</th>
            <th>pkt. pozytywne</th>
            <th>pkt. negatywne</th>
            <th>pkt. specjalne</th>
        </tr>
    </thead>
    <tbody id="tableBody"> 
    </tbody>
</table>
    <div id="adminStats">
        <p>Admin Tygodnia: <span class="badgeWeek"></span></p>
        <p>Admin Miesiąca: <span class="badgeMonth"></span></p>
    </div>
    <ol id="commit">
</ol>
    </div>
    <div id="settingsModal" class="modal">
        <div class="modal-content">
                <span class="close" id="closeSettings">&times;</span>
            <h2>Ustawienia</h2>
                <input type="checkbox" id="darklightmode" id="darkLightMode">Jasny/Ciemny tryb<br>
            <hr>
        <div class="change-password">
            <h3>Zmiana hasła</h3>
                <input type="password" id="oldPassword" placeholder="Stare hasło">
                <input type="password" id="newPassword" placeholder="Nowe hasło">
                <span id="passwordError" style="color: red;"></span>
        <button id="changePasswordBtn">Zapisz</button>
            </div>
        <button id="logoutBtn">Wyloguj</button>
        <br>
            </div>
    </div>

    <div id="manageModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeManage">&times;</span>
            <h2> Zarządzanie użytkownikami</h2>
            <select id="userSelect">
                <option value="">Wybierz użytkownika</option>
            </select>
            <input type="number" id="points" placeholder="Punkty">
            <select id="pointsType">
                <option value="POSITIVE">Dodatnie</option>
                <option value="NEGATIVE">Ujemne</option>
                <option value="SPECIAL">Specjalne</option>
            </select>
            <textarea id="reason" placeholder="Powód" rows="4"></textarea>
            <button id="addPointsBtn">Dodaj Punkty</button>
        </div>
        </div>
    <script src="admin.js"></script>
    </body>
    </html>
